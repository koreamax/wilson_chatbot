services:
  chroma-db:
    image: chromadb/chroma:latest
    container_name: wilson-chroma-db
    ports:
      - "0.0.0.0:8000:8000"
    environment:
      IS_PERSISTENT: "TRUE"
      PERSIST_DIRECTORY: /data
      ANONYMIZED_TELEMETRY: "FALSE"
    volumes:
      - chroma-data:/data
    healthcheck:
      test:
        - CMD-SHELL
        - "bash -c '</dev/tcp/localhost/8000'"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  chroma-init:
    image: curlimages/curl:latest
    depends_on:
      chroma-db:
        condition: service_healthy
    environment:
      CHROMA_HOST: chroma-db
      CHROMA_PORT: "8000"
    entrypoint:
      - /bin/sh
    command:
      - -c
      - |
        set -eu

        base_url="http://$${CHROMA_HOST}:$${CHROMA_PORT}/api/v2/tenants/default_tenant/databases/default_database/collections"

        for payload in \
          '{"name":"static_knowledge","metadata":{"display_name":"정적 지식","owner":"wilson-ai"},"get_or_create":true}' \
          '{"name":"elder","metadata":{"display_name":"노인 개인 컨텍스트","owner":"wilson-ai"},"get_or_create":true}' \
          '{"name":"guardian","metadata":{"display_name":"보호자 컨텍스트","owner":"wilson-ai"},"get_or_create":true}'
        do
          curl -fsS -X POST "$${base_url}" \
            -H 'Content-Type: application/json' \
            -d "$${payload}" > /dev/null
        done

        echo "ChromaDB collections are ready: static_knowledge, elder, guardian"
    restart: "no"

  chroma-tunnel:
    image: cloudflare/cloudflared:latest
    container_name: wilson-chroma-tunnel
    profiles:
      - tunnel
    depends_on:
      chroma-db:
        condition: service_healthy
    command:
      - tunnel
      - --no-autoupdate
      - --url
      - http://chroma-db:8000
    restart: unless-stopped

volumes:
  chroma-data:
