apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: chroma-db
spec:
  serviceName: chroma-db-headless
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: chroma-db
  template:
    metadata:
      labels:
        app.kubernetes.io/name: chroma-db
    spec:
      containers:
        - name: chroma
          image: chromadb/chroma:latest
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: IS_PERSISTENT
              value: "TRUE"
            - name: PERSIST_DIRECTORY
              value: /chroma/chroma
            - name: ANONYMIZED_TELEMETRY
              value: "FALSE"
          startupProbe:
            tcpSocket:
              port: http
            failureThreshold: 30
            periodSeconds: 2
          livenessProbe:
            tcpSocket:
              port: http
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: http
            periodSeconds: 5
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: chroma-data
              mountPath: /chroma/chroma
  volumeClaimTemplates:
    - metadata:
        name: chroma-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
