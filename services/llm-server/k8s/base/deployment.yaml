apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: llm-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: llm-server
    spec:
      containers:
        - name: llm-server
          image: wilson/llm-server:dev
          ports:
            - name: grpc
              containerPort: 50053
          env:
            - name: OLLAMA_BASE_URL
              value: http://ollama:11434
            - name: OLLAMA_MODEL
              value: gpt-oss:20b
