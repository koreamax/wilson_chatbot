apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: rag-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rag-server
    spec:
      initContainers:
        - name: wait-and-init-chroma
          image: wilson/rag-server:dev
          command:
            - python
            - -m
            - wilson_rag.init_collections
          env:
            - name: CHROMA_HOST
              value: chroma-db
            - name: CHROMA_PORT
              value: "8000"
            - name: CHROMA_SSL
              value: "false"
            - name: CHROMA_CONNECT_TIMEOUT_SECONDS
              value: "60"
      containers:
        - name: rag-server
          image: wilson/rag-server:dev
          ports:
            - name: grpc
              containerPort: 50052
          env:
            - name: CHROMA_HOST
              value: chroma-db
            - name: CHROMA_PORT
              value: "8000"
            - name: CHROMA_SSL
              value: "false"
            - name: CHROMA_CONNECT_TIMEOUT_SECONDS
              value: "60"
            - name: STATIC_KNOWLEDGE_COLLECTION
              value: static_knowledge
            - name: ELDER_COLLECTION
              value: elder
            - name: GUARDIAN_COLLECTION
              value: guardian
          startupProbe:
            tcpSocket:
              port: grpc
            failureThreshold: 30
            periodSeconds: 2
          livenessProbe:
            tcpSocket:
              port: grpc
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - python
                - -m
                - wilson_rag.healthcheck
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
