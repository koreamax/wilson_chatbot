syntax = "proto3";

package wilson.rag.v1;

enum ChromaCollection {
  CHROMA_COLLECTION_UNSPECIFIED = 0;
  STATIC_KNOWLEDGE = 1;
  ELDER = 2;
  GUARDIAN = 3;
}

message BuildContextRequest {
  string trace_id = 1;
  string turn_id = 2;
  string target_user_id = 3;
  string session_id = 4;
  string query_text = 5;
  repeated ChromaCollection collections = 6;
}

message ContextChunk {
  string collection = 1;
  string document_id = 2;
  string text = 3;
  float score = 4;
}

message BuildContextResponse {
  repeated ContextChunk chunks = 1;
  bool fallback_used = 2;
}

// 세션 종료 후 대화 저장(write). 오케스트레이터가 세션 종료 시 그 세션의 턴들을 담아 호출한다.
message ConversationTurn {
  string turn_id = 1;
  string stt_text = 2;            // 사용자 발화(STT)
  string llm_response_text = 3;   // AI 응답
}

message StoreConversationRequest {
  string trace_id = 1;
  string target_user_id = 2;      // 노인(스코프 키)
  string session_id = 3;
  repeated ConversationTurn turns = 4;
}

message StoreConversationResponse {
  uint32 stored_count = 1;        // 저장된 임베딩 수
}

service RagService {
  rpc BuildContext(BuildContextRequest) returns (BuildContextResponse);
  rpc StoreConversation(StoreConversationRequest) returns (StoreConversationResponse);
}
